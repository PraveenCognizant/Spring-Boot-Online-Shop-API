# ============================================================
# CONCEPT 24: application-prod.properties — Production Profile
# ============================================================
#
# Activated when: spring.profiles.active=prod
# OR via command line: java -jar app.jar --spring.profiles.active=prod
# OR via env variable: SPRING_PROFILES_ACTIVE=prod
#
# In prod: minimal logging, no H2 console, no SQL output,
#          use a real database (PostgreSQL/MySQL), no seed data.
#
# In a real project you'd configure a real DB here:
#   spring.datasource.url=jdbc:postgresql://db-host:5432/shopdb
#   spring.datasource.username=${DB_USER}   <- from env variable
#   spring.datasource.password=${DB_PASS}   <- from env variable
# ============================================================

# No SQL printing — noise in prod logs
spring.jpa.show-sql=false

# validate = just check schema matches entities, don't modify
spring.jpa.hibernate.ddl-auto=validate

# Disable H2 console (security risk in production)
spring.h2.console.enabled=false

# Minimal logging in production
logging.level.root=WARN
logging.level.com.example.springcore=INFO

# No stack traces in error responses
server.error.include-stacktrace=never
server.error.include-message=never

# Expose fewer actuator endpoints
management.endpoints.web.exposure.include=health,info

spring.main.banner-mode=off

app.environment=PRODUCTION
