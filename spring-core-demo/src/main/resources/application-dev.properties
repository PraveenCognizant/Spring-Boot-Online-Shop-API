# ============================================================
# CONCEPT 23: application-dev.properties — Development Profile
# ============================================================
#
# Profile files MERGE with application.properties.
# Properties here OVERRIDE matching keys in application.properties.
#
# Activated when: spring.profiles.active=dev
# Use case: local development settings — verbose logging, H2 console,
#           detailed errors, seed data enabled (via @Profile("dev") bean)
#
# Profiles let you have different behavior per environment without
# changing code — just swap the profile name.
# ============================================================

# More verbose SQL in dev
spring.jpa.show-sql=true
logging.level.com.example.springcore=DEBUG

# Dev-friendly error messages (DO NOT use in prod — exposes internals)
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always

# Dev banner
spring.main.banner-mode=console

# Profile indicator
app.environment=DEVELOPMENT
