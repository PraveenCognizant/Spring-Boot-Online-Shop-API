# ============================================================
# CONCEPT 22: application.properties — Spring Boot Configuration
# ============================================================
#
# Spring Boot auto-reads this file at startup.
# Every spring.* property triggers auto-configuration.
# You never write XML configuration — just these key=value pairs.
#
# FORMAT: key=value
# Hierarchical keys use dots: spring.datasource.url
# ============================================================

# ---- Active Profile ----
# Activates application-dev.properties (merged with this file)
# Change to "prod" before deploying: spring.profiles.active=prod
spring.profiles.active=dev

# ---- Application Info ----
spring.application.name=spring-core-demo

# ---- Server ----
server.port=8082
# server.port=0  ← random port (useful in tests)

# ---- H2 In-Memory Database ----
# H2 is auto-configured because h2 is on the classpath.
# The URL "mem:shopdb" creates an in-memory DB named "shopdb".
spring.datasource.url=jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- H2 Web Console ----
# Visit http://localhost:8080/h2-console to browse the DB in the browser
# JDBC URL to enter: jdbc:h2:mem:shopdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
# create-drop: creates tables at startup, drops them at shutdown (good for dev)
# update     : updates schema without dropping data
# validate   : only validates — use in production
# none       : do nothing (use Flyway/Liquibase in production)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---- Jackson (JSON) ----
# Serialize LocalDateTime as "2024-01-15T10:30:00" (not a big array)
spring.jackson.serialization.write-dates-as-timestamps=false
# Ignore unknown JSON fields instead of throwing error
spring.jackson.deserialization.fail-on-unknown-properties=false

# ---- Logging ----
# Levels: TRACE < DEBUG < INFO < WARN < ERROR < OFF
logging.level.root=INFO
logging.level.com.example.springcore=DEBUG
logging.level.org.springframework.web=DEBUG
# Shows SQL parameter values (useful in dev)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ---- Actuator ----
# Exposes: /actuator/health, /actuator/info, /actuator/metrics
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ---- App Info (shown in /actuator/info) ----
info.app.name=Spring Boot Online Shop
info.app.version=1.0.0
info.app.description=Learn Spring Boot with real-world examples

# ---- Custom App Properties (@ConfigurationProperties) ----
app.name=Online Shop
app.version=1.0.0
app.max-order-quantity=100
app.support-email=support@onlineshop.com
app.currency=USD
